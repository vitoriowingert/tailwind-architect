name: Publish

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for npm Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      # Trusted Publishing requires npm 11.5.1+ (OIDC support)
      - name: Ensure npm 11+
        run: npm install -g npm@11

      # Trusted Publishing (OIDC): no NODE_AUTH_TOKEN; npm CLI uses GitHub OIDC token. Configure Trusted Publisher on npm for each package.
      - name: Publish shared
        run: npm publish --workspace @tailwind-architect/shared --access public

      - name: Publish core
        run: npm publish --workspace @tailwind-architect/core --access public

      - name: Publish CLI
        run: npm publish --workspace tailwind-architect --access public

  package-extension:
    needs:
      - publish-npm
      - publish-github-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      # Full build (shared → core → cli → vscode-extension) so extension TypeScript sees @tailwind-architect/core dist/ and types.
      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: cd packages/vscode-extension && vsce package --no-dependencies

      - name: Publish extension to Marketplace
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [ -n "$VSCE_TOKEN" ]; then
            cd packages/vscode-extension && vsce publish --pat "$VSCE_TOKEN"
          else
            echo "VSCE_TOKEN not set, skipping extension publish"
          fi

  publish-github-packages:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc

      - name: Publish shared to GitHub Packages
        run: npm publish --workspace @tailwind-architect/shared --access public --registry=https://npm.pkg.github.com

      - name: Publish core to GitHub Packages
        run: npm publish --workspace @tailwind-architect/core --access public --registry=https://npm.pkg.github.com
