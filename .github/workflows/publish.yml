name: Publish

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish core
        run: npm publish --workspace @tailwind-architect/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        run: npm publish --workspace tailwind-architect --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build extension
        run: npm run build --workspace tailwind-architect-vscode

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: cd packages/vscode-extension && vsce package --no-dependencies

      - name: Publish extension to Marketplace
        if: ${{ secrets.VSCE_TOKEN != '' }}
        run: cd packages/vscode-extension && vsce publish --pat ${{ secrets.VSCE_TOKEN }}
