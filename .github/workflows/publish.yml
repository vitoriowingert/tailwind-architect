name: Publish

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # NPM_TOKEN must be an Automation token (or Granular with "Bypass two-factor authentication") so CI does not require OTP (EOTP).
      - name: Publish shared
        run: npm publish --workspace @tailwind-architect/shared --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish core
        run: npm publish --workspace @tailwind-architect/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        run: npm publish --workspace tailwind-architect --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      # Extension depends on @tailwind-architect/core; build shared and core first so dist/ and types exist.
      - name: Build extension dependencies
        run: npm run build --workspace @tailwind-architect/shared && npm run build --workspace @tailwind-architect/core

      - name: Build extension
        run: npm run build --workspace tailwind-architect-vscode

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: cd packages/vscode-extension && vsce package --no-dependencies

      - name: Publish extension to Marketplace
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [ -n "$VSCE_TOKEN" ]; then
            cd packages/vscode-extension && vsce publish --pat "$VSCE_TOKEN"
          else
            echo "VSCE_TOKEN not set, skipping extension publish"
          fi
